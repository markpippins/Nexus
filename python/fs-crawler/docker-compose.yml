version: '3.8'

services:
  app:
    build: .
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongoUser:somePassword@172.16.30.32:27017/?authSource=admin
      - MYSQL_URL=mysql://media:changeme@mysql:3306/media
      - PYTHONPATH=/app
    volumes:
      - ./app:/app
      - ./media:/media:ro  # Mount media directories as read-only
    depends_on:
      - redis
      - mysql
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=media
      - MYSQL_USER=media
      - MYSQL_PASSWORD=changeme
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  redis_data:
  mysql_data:
